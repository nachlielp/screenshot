<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f7f8fa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
      align-items: center;
    }

    .preview-container {
      width: 100%;
      max-width: 100%;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    video, img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 80vh;
      object-fit: contain;
    }

    .actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-download {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-download:hover:not(:disabled) {
      background: #e0e0e0;
      border-color: #FFC107;
      transform: translateY(-1px);
    }

    .btn-share {
      background: #FFC107;
      color: #1a1a1a;
    }

    .btn-share:hover:not(:disabled) {
      background: #FFD54F;
      transform: translateY(-1px);
    }

    .btn-share.copied {
      background: #FFD54F;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: #ef4444;
      color: white;
      padding: 16px 24px;
      border-radius: 8px;
      text-align: center;
      max-width: 500px;
    }

    .link-display {
      display: none;
      background: #fffef5;
      border: 1px solid #FFC107;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 14px;
      color: #1a1a1a;
      word-break: break-all;
      max-width: 600px;
      text-align: center;
    }

    .link-display.show {
      display: block;
    }

    /* ── Video review: filmstrip + frame snapping ── */
    .review-bar {
      display: none;
      width: 100%;
      flex-direction: column;
      gap: 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
    }

    .review-bar.show {
      display: flex;
    }

    .filmstrip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .filmstrip button {
      padding: 0;
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      background: #eee;
      flex: 0 0 auto;
      cursor: pointer;
      position: relative;
    }

    .filmstrip button:hover {
      border-color: #FFC107;
    }

    .filmstrip img {
      display: block;
      height: 62px;
      width: auto;
      max-height: 62px;
    }

    .filmstrip .ts {
      position: absolute;
      bottom: 2px;
      right: 4px;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      font-size: 10px;
      padding: 1px 4px;
      border-radius: 4px;
    }

    .review-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .review-actions .hint {
      font-size: 13px;
      color: #6b7280;
    }

    .btn-snap {
      background: #1a1a1a;
      color: white;
      padding: 10px 20px;
      font-size: 14px;
    }

    .btn-snap:hover:not(:disabled) {
      background: #333;
      transform: translateY(-1px);
    }

    .btn-annotate {
      background: #FFC107;
      color: #1a1a1a;
      padding: 10px 20px;
      font-size: 14px;
    }

    .btn-annotate:hover:not(:disabled) {
      background: #FFD54F;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="actions">

      <button class="btn-share" id="shareBtn">
        <span>🔗</span>
        <span id="shareText">Create Shareable Link</span>
      </button>
    </div>
    <div class="preview-container" id="preview">
      <!-- Video or image will be injected here -->
    </div>

    <div class="review-bar" id="reviewBar">
      <div class="filmstrip" id="filmstrip"></div>
      <div class="review-actions">
        <button class="btn-snap" id="snapFrameBtn">
          <span>📸</span>
          <span>Snap frame</span>
        </button>
        <button class="btn-annotate" id="annotateFramesBtn" disabled>
          <span>✏️</span>
          <span id="annotateFramesText">Annotate frames (0)</span>
        </button>
        <span class="hint">Scrub or click a thumbnail, then snap the moments you want to annotate.</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn-download" id="downloadBtn">
        <span>⬇️</span>
        <span>Download</span>
      </button>
      <button class="btn-download" id="downloadConsoleBtn" style="display: none;">
        <span>🖥️</span>
        <span>Console Logs</span>
      </button>
      <button class="btn-download" id="downloadNetworkBtn" style="display: none;">
        <span>🌐</span>
        <span>Network Logs</span>
      </button>
    </div>

    <div class="link-display" id="linkDisplay"></div>
    
    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script type="module" src="video.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            --paper: #faedf0;
            --paper-dark: #f2dbe1;
            --ink: #151515;
            --muted: #6f5b61;
            --line: #e4c8cf;
            --line-strong: #c9a0ab;
            --brand: #be185d;
            --brand-dark: #9d174d;
            --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system,
                BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 360px;
            font-family: var(--font-sans);
            background: var(--paper);
            color: var(--ink);
        }

        body {
            padding: 14px;
        }

        .shell {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            padding: 12px;
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
        }

        [hidden] {
            display: none !important;
        }

        /* Video-recording entry points are hidden per product decision.
           The buttons and their click handlers in script.js stay intact —
           this only removes them from view. */
        #recordTabBtn,
        #recordScreenBtn {
            display: none !important;
        }

        .tile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .tile,
        .action-row,
        .mini-btn {
            font: inherit;
            border: none;
            cursor: pointer;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 116px;
            padding: 14px 8px 12px;
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 8px;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .tile:hover {
            background: var(--paper-dark);
            border-color: var(--line-strong);
        }

        .tile:hover .tile-icon {
            color: var(--brand);
        }

        .tile-icon,
        .row-icon {
            color: var(--muted);
        }

        .tile-icon svg {
            width: 48px;
            height: 48px;
        }

        .tile-title {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.15;
        }

        .action-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .mode-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .mode-title {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mode-title strong {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .mode-title span {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.35;
        }

        .mode-pill {
            min-width: 116px;
            padding: 10px 12px;
            border-radius: 8px;
            background: var(--paper-dark);
            border: 1.5px solid var(--line);
            color: var(--ink);
            display: flex;
            flex-direction: column;
            gap: 3px;
            align-items: flex-start;
        }

        .mode-pill-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .mode-pill-value {
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
            color: var(--brand);
        }

        .mode-pill-note {
            font-size: 11px;
            line-height: 1.2;
            color: var(--muted);
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 15px 16px;
            text-align: left;
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 8px;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .action-row:hover {
            background: var(--paper-dark);
            border-color: var(--line-strong);
        }

        .action-row:hover .row-icon {
            color: var(--brand);
        }

        .action-row.counting-down {
            background: var(--paper-dark);
            border-color: var(--brand);
        }

        .action-row.counting-down .row-icon,
        .action-row.counting-down .row-label,
        .action-row.counting-down .delay-pill {
            color: var(--brand);
        }

        .action-row:hover .delay-pill {
            opacity: 1;
        }

        .row-icon svg {
            width: 24px;
            height: 24px;
        }

        .row-label {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
        }

        .delay-pill {
            min-width: 2.4ch;
            text-align: right;
            color: var(--muted);
            font-size: 16px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .action-row.counting-down .delay-pill {
            opacity: 1;
        }

        .add-frame-badge {
            min-width: 1.6ch;
            font-size: 28px;
            font-weight: 700;
            line-height: 1;
            color: var(--brand);
            opacity: 0.72;
        }

        .action-row:hover .add-frame-badge {
            opacity: 1;
            transform: scale(1.05);
        }

        .footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px;
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }

        .account-copy {
            min-width: 0;
        }

        .account-copy strong {
            display: block;
            font-size: 15px;
            font-weight: 700;
        }

        .account-copy span {
            display: block;
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .footer-actions {
            display: flex;
            gap: 8px;
        }

        /* Signature 3D press-down buttons. */
        .mini-btn {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            height: 2.125rem;
            padding: 0 12px;
            border-radius: 6px;
            border: 1.5px solid var(--brand-dark);
            box-shadow: 0 2px 0 var(--brand-dark);
            background: var(--brand);
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.05s ease, box-shadow 0.05s ease, filter 0.1s ease;
        }

        .mini-btn:hover {
            filter: brightness(1.06);
        }

        .mini-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .mini-btn.secondary {
            background: #fff;
            color: var(--ink);
            border: 1.5px solid var(--line-strong);
            box-shadow: 0 2px 0 var(--line-strong);
        }

        .mini-btn.secondary:hover {
            background: #fff7f8;
            filter: none;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel" id="homePanel">
            <div class="tile-grid">
                <button class="tile" id="tabBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                            <path d="M8 8h8"></path>
                            <path d="M8 12h5"></path>
                            <path d="M8 16h8"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Tab</span>
                </button>

                <button class="tile" id="slideshowBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="4" y="5" width="10" height="14" rx="2"></rect>
                            <rect x="10" y="5" width="10" height="14" rx="2"></rect>
                            <path d="M10 9h10"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Slideshow</span>
                </button>

                <button class="tile" id="fullPageBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                            <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
                            <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
                            <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
                            <path d="M8 7h8"></path>
                            <path d="M8 12h8"></path>
                            <path d="M8 17h8"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Full Page</span>
                </button>
            </div>

            <div class="action-list">
                <button class="action-row" id="delayedTabBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 8v5l3 2"></path>
                            <path d="M3.05 11a9 9 0 1 0 .5-2"></path>
                            <path d="M3 4v5h5"></path>
                        </svg>
                    </span>
                    <span class="row-label">Visible Part after Delay</span>
                    <span class="delay-pill">3s</span>
                </button>

                <button class="action-row" id="screenWindowBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="11" rx="2"></rect>
                            <path d="M8 21h8"></path>
                            <path d="M12 16v5"></path>
                            <path d="M7 9h10"></path>
                        </svg>
                    </span>
                    <span class="row-label">Entire Screen &amp; App Window</span>
                </button>

                <button class="action-row" id="recordTabBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                            <circle cx="12" cy="12" r="3.2" fill="currentColor" stroke="none"></circle>
                        </svg>
                    </span>
                    <span class="row-label">Record Tab (video)</span>
                </button>

                <button class="action-row" id="recordScreenBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="12" rx="2"></rect>
                            <path d="M8 21h8"></path>
                            <path d="M12 16v5"></path>
                            <circle cx="12" cy="10" r="2.6" fill="currentColor" stroke="none"></circle>
                        </svg>
                    </span>
                    <span class="row-label">Record Screen (video)</span>
                </button>

                <button class="action-row" id="stopRecordingBtn" type="button" hidden style="border-color: #ef4444;">
                    <span class="row-icon" style="color: #ef4444;">
                        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                            <rect x="7" y="7" width="10" height="10" rx="1.5"></rect>
                        </svg>
                    </span>
                    <span class="row-label" style="color: #ef4444; font-weight: 600;">Stop Recording</span>
                </button>

                <button class="action-row" id="annotateImageBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="14" height="14" rx="2"></rect>
                            <path d="m7 14 2.5-2.5L12 14l2-2 3 3"></path>
                            <path d="M15 8h.01"></path>
                            <path d="M20 14v7"></path>
                            <path d="M16.5 17.5H23.5"></path>
                        </svg>
                    </span>
                    <span class="row-label">Annotate Local &amp; Clipboard Image</span>
                </button>
            </div>
        </div>

        <div class="panel" id="slideshowPanel" hidden>
            <div class="mode-header">
                <div class="mode-title">
                    <strong>Slideshow Mode</strong>
                    <span id="slideshowFrameHint">Capture frames one after another, then finish to annotate and upload.</span>
                </div>
                <div class="mode-pill">
                    <span class="mode-pill-label">Frames</span>
                    <span class="mode-pill-value" id="slideshowFrameCount">0</span>
                    <span class="mode-pill-note" id="slideshowFrameState">Ready to start</span>
                </div>
            </div>

            <div class="action-list">
                <button class="action-row" id="slideshowTabBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                            <path d="M3 9h18"></path>
                            <path d="M8 7h.01"></path>
                            <path d="M12 7h.01"></path>
                        </svg>
                    </span>
                    <span class="row-label">Tab</span>
                    <span class="delay-pill add-frame-badge">+</span>
                </button>

                <button class="action-row" id="slideshowScreenshotBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="14" rx="3"></rect>
                            <path d="M8 20h8"></path>
                            <path d="M12 18v2"></path>
                        </svg>
                    </span>
                    <span class="row-label">Screenshot</span>
                    <span class="delay-pill add-frame-badge">+</span>
                </button>

                <button class="action-row" id="slideshowFinishBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M5 12l4 4L19 6"></path>
                        </svg>
                    </span>
                    <span class="row-label">Finish</span>
                    <span class="delay-pill">→</span>
                </button>
            </div>
        </div>

        <div class="footer">
            <div class="footer-top">
                <div class="account-copy">
                    <strong id="userName">Not signed in</strong>
                    <span id="userEmail">Sign in to share your captures</span>
                </div>
            </div>

            <div class="footer-actions">
                <button class="mini-btn" id="libraryBtn" type="button" style="display: none;">Library</button>
                <button class="mini-btn secondary" id="signInGoogleBtn" type="button">Sign In</button>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>

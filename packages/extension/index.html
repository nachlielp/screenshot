<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Recorder</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 360px;
            font-family: "Josefin Sans", -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f7f8fa;
            color: #1a1a1a;
        }

        body {
            padding: 14px;
        }

        .shell {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel {
            padding: 12px;
            background: #ffffff;
            border: 1px solid #e6e8ef;
            border-radius: 22px;
            box-shadow: 0 10px 24px rgba(26, 26, 26, 0.08);
        }

        .tile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .tile,
        .action-row,
        .mini-btn {
            font: inherit;
            border: none;
            cursor: pointer;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-height: 116px;
            padding: 14px 8px 12px;
            background: #f8f8fb;
            border: 1px solid #eceef4;
            border-radius: 18px;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .tile:hover {
            background: #fff6dd;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(255, 193, 7, 0.18);
        }

        .tile-icon,
        .row-icon {
            color: #5a8ef6;
        }

        .tile-icon svg {
            width: 48px;
            height: 48px;
        }

        .tile-title {
            text-align: center;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.15;
        }

        .action-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 15px 16px;
            text-align: left;
            background: #f8f8fb;
            border: 1px solid #eceef4;
            border-radius: 18px;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        .action-row:hover {
            background: #eaf3ff;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(90, 142, 246, 0.16);
        }

        .action-row.counting-down {
            background: #fff6dd;
            box-shadow: 0 8px 18px rgba(255, 193, 7, 0.18);
        }

        .action-row.counting-down .row-icon,
        .action-row.counting-down .row-label,
        .action-row.counting-down .delay-pill {
            color: #8a5b00;
        }

        .action-row:hover .delay-pill {
            opacity: 1;
        }

        .row-icon svg {
            width: 24px;
            height: 24px;
        }

        .row-label {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
        }

        .delay-pill {
            min-width: 2.4ch;
            text-align: right;
            color: #7d8597;
            font-size: 16px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.18s ease;
        }

        .action-row.counting-down .delay-pill {
            opacity: 1;
        }

        .footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px;
            background: #ffffff;
            border: 1px solid #e6e8ef;
            border-radius: 20px;
            box-shadow: 0 10px 24px rgba(26, 26, 26, 0.06);
        }

        .footer-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
        }

        .account-copy {
            min-width: 0;
        }

        .account-copy strong {
            display: block;
            font-size: 15px;
        }

        .account-copy span {
            display: block;
            margin-top: 2px;
            color: #6f7787;
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .footer-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            flex: 1;
            padding: 10px 12px;
            border-radius: 14px;
            background: #fff6dd;
            color: #664700;
            font-size: 12px;
            font-weight: 700;
        }

        .mini-btn.secondary {
            background: #f5f6fa;
            color: #414755;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="panel">
            <div class="tile-grid">
                <button class="tile" id="visiblePartBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                            <path d="M3 9h18"></path>
                            <path d="M8 7h.01"></path>
                            <path d="M12 7h.01"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Tab</span>
                </button>

                <button class="tile" id="tabWithLogsBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                            <path d="M8 8h8"></path>
                            <path d="M8 12h5"></path>
                            <path d="M8 16h8"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Tab + Logs &amp; Network</span>
                </button>

                <button class="tile" id="fullPageBtn" type="button">
                    <span class="tile-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                            <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
                            <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
                            <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
                            <path d="M8 7h8"></path>
                            <path d="M8 12h8"></path>
                            <path d="M8 17h8"></path>
                        </svg>
                    </span>
                    <span class="tile-title">Full Page</span>
                </button>
            </div>

            <div class="action-list">
                <button class="action-row" id="delayedTabBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 8v5l3 2"></path>
                            <path d="M3.05 11a9 9 0 1 0 .5-2"></path>
                            <path d="M3 4v5h5"></path>
                        </svg>
                    </span>
                    <span class="row-label">Visible Part after Delay</span>
                    <span class="delay-pill">3s</span>
                </button>

                <button class="action-row" id="screenWindowBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="18" height="11" rx="2"></rect>
                            <path d="M8 21h8"></path>
                            <path d="M12 16v5"></path>
                            <path d="M7 9h10"></path>
                        </svg>
                    </span>
                    <span class="row-label">Entire Screen &amp; App Window</span>
                </button>

                <button class="action-row" id="annotateImageBtn" type="button">
                    <span class="row-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <rect x="3" y="5" width="14" height="14" rx="2"></rect>
                            <path d="m7 14 2.5-2.5L12 14l2-2 3 3"></path>
                            <path d="M15 8h.01"></path>
                            <path d="M20 14v7"></path>
                            <path d="M16.5 17.5H23.5"></path>
                        </svg>
                    </span>
                    <span class="row-label">Annotate Local &amp; Clipboard Image</span>
                </button>
            </div>
        </div>

        <div class="footer">
            <div class="footer-top">
                <div class="account-copy">
                    <strong id="userName">Not signed in</strong>
                    <span id="userEmail">Sign in to share your captures</span>
                </div>
            </div>

            <div class="footer-actions">
                <button class="mini-btn" id="libraryBtn" type="button" style="display: none;">Library</button>
                <button class="mini-btn secondary" id="signInGoogleBtn" type="button">Sign In</button>
            </div>
        </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>

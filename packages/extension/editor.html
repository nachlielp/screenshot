<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Screenshot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=Source+Code+Pro:wght@400..700&display=swap');

    :root {
      --paper: #faedf0;
      --paper-dark: #f2dbe1;
      --ink: #151515;
      --muted: #6f5b61;
      --line: #e4c8cf;
      --line-strong: #c9a0ab;
      --brand: #f54e00;
      --brand-dark: #b23800;
      --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
    }

    body {
      background: var(--paper);
      overflow: hidden;
      font-family: var(--font-sans);
      color: var(--ink);
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #toolbar-header {
      background: #fff;
      padding: 12px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1.5px solid var(--line);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    #toolbar {
      background: transparent;
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      justify-content: center;
    }

    .tool-btn {
      background: transparent;
      border: none;
      color: var(--ink);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s ease;
      user-select: none;
    }
    .rectangle-btn{
      font-size: 24px;
    }

    .tool-btn:hover {
      background: var(--paper-dark);
    }

    .tool-btn.active {
      background: var(--brand);
      color: #fff;
    }

    .tool-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .tool-separator {
      width: 1px;
      height: 24px;
      background: var(--line);
      margin: 0 4px;
    }

    .color-picker {
      display: flex;
      gap: 6px;
      margin-left: 4px;
    }

    /* Swatch fills are functional drawing colors (set inline) — do not re-hue. */
    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border 0.2s;
    }

    .color-btn.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(245, 78, 0, 0.3);
    }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #editor-canvas {
      max-width: 95%;
      max-height: 95%;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      cursor: crosshair;
    }

    #editor-canvas.grab {
      cursor: grab;
    }

    #editor-canvas.grabbing {
      cursor: grabbing;
    }

    #text-input-overlay {
      position: absolute;
      display: none;
      z-index: 999;
    }

    #text-input {
      font-family: Arial, sans-serif; /* matches canvas text rendering — keep */
      font-size: 20px;
      padding: 4px 8px;
      border: 2px solid var(--brand);
      background: #fff;
      border-radius: 6px;
      outline: none;
      min-width: 100px;
    }

    .icon {
      width: 18px;
      height: 18px;
    }

    #done-btn {
      background: var(--brand);
      color: #fff;
      margin-left: 4px;
      font-weight: 700;
    }

    #done-btn:hover {
      background: var(--brand);
      filter: brightness(1.06);
    }

    #upload-with-logs-btn {
      background: var(--paper-dark);
      color: var(--ink);
      font-weight: 700;
    }

    #upload-with-logs-btn:hover {
      background: var(--paper-dark);
      filter: brightness(0.97);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: var(--line);
      border-radius: 3px;
      height: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--brand);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--brand);
      cursor: pointer;
      border: none;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--ink);
      font-size: 18px;
      z-index: 2000;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(21, 21, 21, 0.5);
      z-index: 3000;
    }

    .confirm-overlay.open {
      display: flex;
    }

    .confirm-modal {
      width: min(100%, 420px);
      background: #fff;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
      padding: 24px;
    }

    .confirm-accent {
      width: 56px;
      height: 6px;
      border-radius: 6px;
      background: var(--brand);
      margin-bottom: 18px;
    }

    .confirm-modal h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .confirm-modal p {
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .confirm-btn {
      border: 1.5px solid var(--line-strong);
      border-radius: 6px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }

    .confirm-btn.cancel {
      background: #fff;
      color: var(--ink);
      border: 1.5px solid var(--line-strong);
    }

    .confirm-btn.cancel:hover {
      border-color: var(--brand);
      color: var(--brand);
    }

    .confirm-btn.confirm {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand-dark);
    }

    .confirm-btn.confirm:hover {
      filter: brightness(1.06);
    }
  </style>
</head>
<body>
  <div id="loading">Loading screenshot...</div>

  <div id="toolbar-header" style="display: none;">
    <div id="toolbar">
      <button class="tool-btn" id="undo-btn" title="Undo" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-4"/></svg>
      </button>
      <button class="tool-btn" id="redo-btn" title="Redo" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 14 5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h4"/></svg>
      </button>

      <div class="tool-separator"></div>

      <button class="tool-btn active" id="select-btn" title="Select / Move (V)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m4 3 7 17 2.5-7L20.5 10.5z"/></svg>
      </button>
      <button class="tool-btn" id="crop-btn" title="Crop">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2v14a2 2 0 0 0 2 2h14"/><path d="M2 6h14a2 2 0 0 1 2 2v14"/></svg>
      </button>
      <button class="tool-btn rectangle-btn" id="rectangle-btn" title="Rectangle (R)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg>
      </button>
      <button class="tool-btn" id="arrow-btn" title="Arrow (A)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 19 19 5"/><path d="M9 5h10v10"/></svg>
      </button>
      <button class="tool-btn" id="line-btn" title="Line (L)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 19 19 5"/></svg>
      </button>
      <button class="tool-btn" id="freehand-btn" title="Pen (P)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      </button>
      <button class="tool-btn" id="text-btn" title="Text (T)">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7V5h14v2"/><path d="M12 5v14"/><path d="M9 19h6"/></svg>
      </button>
      <button class="tool-btn" id="delete-btn" title="Delete selected (⌫)" disabled>
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
      </button>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: var(--ink); font-size: 13px;">
        <label for="thickness-slider" style="display: flex; align-items: center; gap: 6px;">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><path d="M4 12h16"/></svg>
          <input type="range" id="thickness-slider" min="5" max="14" value="7" style="width: 80px;">
        </label>
        <span id="thickness-value" style="min-width: 25px;">7px</span>
      </div>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: var(--ink); font-size: 13px;">
        <label for="font-size-slider" style="display: flex; align-items: center; gap: 6px; font-weight: 800;">
          <span>A</span>
          <input type="range" id="font-size-slider" min="12" max="48" value="20" style="width: 80px;">
        </label>
        <span id="font-size-value" style="min-width: 30px;">20px</span>
      </div>

      <div class="tool-separator"></div>

      <div class="color-picker">
        <button class="color-btn active" data-color="#ef4444" style="background: #ef4444;" title="Red"></button>
        <button class="color-btn" data-color="#f59e0b" style="background: #f59e0b;" title="Orange"></button>
        <button class="color-btn" data-color="#eab308" style="background: #eab308;" title="Yellow"></button>
        <button class="color-btn" data-color="#22c55e" style="background: #22c55e;" title="Green"></button>
        <button class="color-btn" data-color="#3b82f6" style="background: #3b82f6;" title="Blue"></button>
        <button class="color-btn" data-color="#8b5cf6" style="background: #8b5cf6;" title="Purple"></button>
        <button class="color-btn" data-color="#ffffff" style="background: #ffffff;" title="White"></button>
      </div>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="copy-btn" title="Copy to clipboard">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></svg>
        <span>Copy</span>
      </button>
      <button class="tool-btn" id="done-btn" title="Upload screenshot">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V4"/><path d="M7 9l5-5 5 5"/><path d="M5 20h14"/></svg>
        <span>Upload</span>
      </button>
      <button class="tool-btn" id="upload-with-logs-btn" title="Upload screenshot with logs and network">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h6"/></svg>
        <span>Upload with logs &amp; network</span>
      </button>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="editor-canvas"></canvas>
  </div>

  <div id="text-input-overlay">
    <input type="text" id="text-input" placeholder="Enter text...">
  </div>

  <div id="confirm-overlay" class="confirm-overlay" role="presentation">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
      <div class="confirm-accent"></div>
      <h2 id="confirm-title">Confirm action</h2>
      <p id="confirm-message">Are you sure?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel-btn" class="confirm-btn cancel" type="button">Cancel</button>
        <button id="confirm-ok-btn" class="confirm-btn confirm" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="editor.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clerk Sync</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #1e1e2e, #3a3a52);
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            white-space: pre-line;
        }
        .success { background: rgba(52, 232, 158, 0.2); }
        .error { background: rgba(239, 68, 68, 0.2); }
        .log {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-size: 12px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentication</h1>
        <div class="spinner"></div>
        <div id="status" class="status">
            Syncing your authentication...
        </div>
        <div id="log" class="log"></div>
    </div>
    
    <script type="module" src="clerk-sync.js"></script>
</body>
</html>

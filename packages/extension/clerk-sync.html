<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://relaxing-fox-80.accounts.dev https://*.clerk.com; connect-src 'self' https://*.accounts.dev https://*.clerk.com;">
    <title>Clerk Sync</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #1e1e2e, #3a3a52);
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            white-space: pre-line;
        }
        .success { background: rgba(52, 232, 158, 0.2); }
        .error { background: rgba(239, 68, 68, 0.2); }
        .log {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-size: 12px;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentication</h1>
        <div class="spinner"></div>
        <div id="status" class="status">
            Syncing your authentication...
        </div>
        <div id="log" class="log"></div>
    </div>
    
    <script>
        const statusEl = document.getElementById('status');
        const logEl = document.getElementById('log');
        
        function log(msg) {
            console.log(msg);
            logEl.textContent += msg + '\n';
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        (async () => {
            try {
                log('Starting authentication sync...');
                statusEl.textContent = 'Fetching session from Clerk...';
                
                // Try to get the session directly from Clerk's API
                log('Fetching from Clerk client API...');
                
                const response = await fetch('https://relaxing-fox-80.accounts.dev/v1/client', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                log(`API Response status: ${response.status}`);
                
                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }
                
                const data = await response.json();
                log('API response received');
                
                const client = data.response || data.client || data;
                const sessions = client.sessions || [];
                
                log(`Found ${sessions.length} session(s)`);
                
                if (sessions.length === 0) {
                    throw new Error('No active sessions found');
                }
                
                const session = sessions[0];
                const user = session.user;
                
                if (!user) {
                    throw new Error('No user data in session');
                }
                
                log(`User found: ${user.id}`);
                
                // Get the JWT token
                const token = session.last_active_token?.jwt;
                
                if (!token) {
                    throw new Error('No JWT token found');
                }
                
                log('JWT token found');
                
                const userData = {
                    id: user.id,
                    email: user.email_addresses?.[0]?.email_address || user.primary_email_address?.email_address || 'unknown@email.com',
                    fullName: user.full_name || `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'User',
                    firstName: user.first_name || '',
                    lastName: user.last_name || '',
                    imageUrl: user.image_url || user.profile_image_url || '',
                    token: token,
                    tokenExpiry: Date.now() + (50 * 60 * 1000),
                    sessionId: session.id
                };
                
                log('Storing authentication data...');
                
                await chrome.storage.local.set({ 
                    'clerk_auth': userData,
                    'auth_success': true
                });
                
                log('✅ Authentication data stored!');
                
                statusEl.className = 'status success';
                statusEl.textContent = `✅ Successfully authenticated as ${userData.email}!\n\nClosing in 2 seconds...`;
                
                setTimeout(() => {
                    window.close();
                }, 2000);
                
            } catch (error) {
                console.error('Sync error:', error);
                log(`❌ Error: ${error.message}`);
                
                statusEl.className = 'status error';
                statusEl.textContent = `❌ Error: ${error.message}\n\nPlease make sure you signed in successfully.\n\nClosing in 5 seconds...`;
                
                setTimeout(() => {
                    window.close();
                }, 5000);
            }
        })();
    </script>
</body>
</html>

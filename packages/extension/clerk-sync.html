<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clerk Sync</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&family=Source+Code+Pro:wght@400..700&display=swap');

        :root {
            --paper: #faedf0;
            --paper-dark: #f2dbe1;
            --ink: #151515;
            --muted: #6f5b61;
            --line: #e4c8cf;
            --brand: #be185d;
            --success: #2f9110;
            --success-tint: #e7f4e0;
            --danger: #b91c1c;
            --danger-tint: #fee2e2;
            --code-bg: #1d1f27;
            --code-ink: #e8eaf0;
            --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system,
                BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: "Source Code Pro", ui-monospace, SFMono-Regular, Menlo,
                Monaco, Consolas, monospace;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 20px;
            background: var(--paper);
            color: var(--ink);
        }

        .container {
            max-width: 500px;
            margin: 48px auto;
            text-align: center;
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
            padding: 32px 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0 0 20px;
        }

        .spinner {
            border: 3px solid var(--paper-dark);
            border-top: 3px solid var(--brand);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            margin: 20px 0;
            padding: 14px 16px;
            background: var(--paper-dark);
            border: 1.5px solid var(--line);
            border-radius: 8px;
            white-space: pre-line;
            font-weight: 600;
            color: var(--ink);
        }

        .status.success {
            background: var(--success-tint);
            border-color: var(--success);
            color: var(--success);
        }

        .status.error {
            background: var(--danger-tint);
            border-color: var(--danger);
            color: var(--danger);
        }

        .log {
            margin-top: 20px;
            padding: 12px 14px;
            background: var(--code-bg);
            color: var(--code-ink);
            border-radius: 8px;
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 1.55;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authentication</h1>
        <div class="spinner"></div>
        <div id="status" class="status">
            Syncing your authentication…
        </div>
        <div id="log" class="log"></div>
    </div>

    <script type="module" src="clerk-sync.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in with Google</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            --paper: #faedf0;
            --paper-dark: #f2dbe1;
            --ink: #151515;
            --muted: #6f5b61;
            --line: #e4c8cf;
            --line-strong: #c9a0ab;
            --brand: #be185d;
            --brand-dark: #9d174d;
            --success: #2f9110;
            --danger: #b91c1c;
            --danger-dark: #7f1d1d;
            --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system,
                BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * { box-sizing: border-box; }

        html, body {
            width: 100%;
            min-height: 100%;
        }

        body {
            font-family: var(--font-sans);
            margin: 0;
            padding: 48px 20px;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        .container {
            max-width: 460px;
            margin: 0 auto;
        }

        .kicker {
            display: block;
            text-align: center;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--brand);
            margin-bottom: 8px;
        }

        h1 {
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.15;
            margin: 0 0 28px;
        }

        /* White card with the signature hard offset shadow. */
        #clerk-container {
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
            padding: 24px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .loading {
            text-align: center;
            padding: 24px;
            color: var(--muted);
            font-weight: 600;
        }

        .spinner {
            border: 3px solid var(--paper-dark);
            border-top: 3px solid var(--brand);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success {
            text-align: center;
            padding: 24px;
            color: var(--ink);
        }

        .success h2 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--success);
            margin: 0 0 12px;
        }

        .success p { color: var(--muted); font-weight: 600; margin: 6px 0; }
        .success strong { color: var(--ink); }
    </style>
</head>
<body>
    <div class="container">
        <span class="kicker">Screenshot</span>
        <h1>Sign in with Google</h1>
        <div id="clerk-container">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading authentication…</p>
            </div>
        </div>
    </div>

    <script type="module" src="auth-page.js"></script>
</body>
</html>

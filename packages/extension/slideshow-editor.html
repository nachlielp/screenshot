<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Slideshow</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap');

    :root {
      --paper: #faedf0;
      --paper-dark: #f2dbe1;
      --ink: #151515;
      --muted: #6f5b61;
      --line: #e4c8cf;
      --line-strong: #c9a0ab;
      --brand: #be185d;
      --brand-dark: #9d174d;
      --danger: #b91c1c;
      --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      font-family: var(--font-sans);
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--ink);
      font-size: 18px;
      z-index: 2000;
    }

    #toolbar-header {
      background: #fff;
      padding: 12px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
      border-bottom: 1.5px solid var(--brand);
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
    }

    .top-bar,
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-bar {
      justify-content: space-between;
    }

    .top-bar-left,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .frame-status {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 6px;
      background: var(--paper-dark);
    }

    .tool-btn {
      background: transparent;
      border: none;
      color: var(--ink);
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      user-select: none;
    }

    .tool-btn:hover {
      background: var(--paper-dark);
    }

    .tool-btn.active {
      background: var(--brand);
      color: #fff;
    }

    .tool-btn.danger {
      color: var(--danger);
      background: var(--paper-dark);
    }

    .tool-btn.danger:hover {
      background: var(--paper-dark);
    }

    .tool-btn.primary {
      background: var(--brand);
      color: #fff;
      font-weight: 700;
      border: 1.5px solid var(--brand-dark);
      box-shadow: 0 2px 0 var(--brand-dark);
    }

    .tool-btn.primary:hover {
      background: var(--brand);
    }

    .tool-btn.primary:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .tool-separator {
      width: 1px;
      height: 24px;
      background: var(--line);
      margin: 0 4px;
    }

    .color-picker {
      display: flex;
      gap: 6px;
      margin-left: 4px;
    }

    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border 0.2s;
    }

    .color-btn.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 2px rgba(190, 24, 93, 0.3);
    }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
      padding: 24px;
    }

    #editor-canvas {
      max-width: 95%;
      max-height: 95%;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.35);
      cursor: crosshair;
      background: white;
    }

    #text-input-overlay {
      position: absolute;
      display: none;
      z-index: 999;
    }

    #text-input {
      font-family: Arial, sans-serif;
      font-size: 20px;
      padding: 4px 8px;
      border: 1.5px solid var(--brand);
      background: white;
      border-radius: 6px;
      outline: none;
      min-width: 100px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: var(--line);
      border-radius: 3px;
      height: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--brand);
      cursor: pointer;
    }

    .thumbnail-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 18px 18px;
      background: #fff;
      border-top: 1.5px solid var(--line);
      flex-shrink: 0;
    }

    .thumbnail-btn {
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 0;
      overflow: hidden;
      background: var(--paper);
      cursor: pointer;
      position: relative;
      min-width: 112px;
      width: 112px;
      height: 72px;
      flex-shrink: 0;
    }

    .thumbnail-btn.active {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(190, 24, 93, 0.2);
    }

    .thumbnail-btn.hidden-frame::after {
      content: 'Hidden';
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(21, 21, 21, 0.82);
      color: white;
      font-size: 11px;
      font-weight: 700;
    }

    .thumbnail-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(21, 21, 21, 0.5);
      z-index: 3000;
    }

    .confirm-overlay.open {
      display: flex;
    }

    .confirm-modal {
      width: min(100%, 420px);
      background: #fff;
      border: 1.5px solid var(--line-strong);
      border-radius: 10px;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.06);
      padding: 24px;
    }

    .confirm-accent {
      width: 56px;
      height: 6px;
      border-radius: 6px;
      background: var(--brand);
      margin-bottom: 18px;
    }

    .confirm-modal h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .confirm-modal p {
      color: var(--muted);
      line-height: 1.5;
      font-size: 15px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .confirm-btn {
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .confirm-btn.cancel {
      background: white;
      color: var(--ink);
      border: 1.5px solid var(--line-strong);
    }

    .confirm-btn.confirm {
      background: var(--brand);
      color: #fff;
      border: 1.5px solid var(--brand-dark);
      box-shadow: 0 2px 0 var(--brand-dark);
    }

    .confirm-btn.confirm:active {
      transform: translateY(2px);
      box-shadow: none;
    }
  </style>
</head>
<body>
  <div id="loading">Loading slideshow...</div>

  <div id="toolbar-header">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="tool-btn" id="prev-frame-btn" type="button">← Previous</button>
        <button class="tool-btn" id="next-frame-btn" type="button">Next →</button>
        <span class="frame-status" id="frame-status">Frame 1 of 1</span>
      </div>
      <div class="top-bar-right">
        <button class="tool-btn primary" id="done-btn" type="button">Upload Slideshow</button>
      </div>
    </div>

    <div id="toolbar">
      <button class="tool-btn" id="undo-btn" title="Undo" disabled type="button">
        <span>↩</span>
      </button>
      <button class="tool-btn" id="redo-btn" title="Redo" disabled type="button">
        <span>↪</span>
      </button>

      <div class="tool-separator"></div>

      <button class="tool-btn active" id="select-btn" title="Select / Move (V)" type="button">
        <span>⤺</span>
      </button>
      <button class="tool-btn" id="crop-btn" title="Crop" type="button">
        <span>✂️</span>
      </button>
      <button class="tool-btn" id="rectangle-btn" title="Rectangle (R)" type="button">
        <span>□</span>
      </button>
      <button class="tool-btn" id="arrow-btn" title="Arrow (A)" type="button">
        <span>↗️</span>
      </button>
      <button class="tool-btn" id="line-btn" title="Line (L)" type="button">
        <span>╱</span>
      </button>
      <button class="tool-btn" id="freehand-btn" title="Pen (P)" type="button">
        <span>✎</span>
      </button>
      <button class="tool-btn" id="text-btn" title="Text (T)" type="button">
        <span>T</span>
      </button>
      <button class="tool-btn" id="delete-btn" title="Delete selected (⌫)" type="button" disabled>
        <span>🗑</span>
      </button>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: var(--ink); font-size: 13px;">
        <label for="thickness-slider" style="display: flex; align-items: center; gap: 6px;">
          <span>━</span>
          <input type="range" id="thickness-slider" min="5" max="14" value="7" style="width: 80px;">
        </label>
        <span id="thickness-value" style="min-width: 25px;">7px</span>
      </div>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: var(--ink); font-size: 13px;">
        <label for="font-size-slider" style="display: flex; align-items: center; gap: 6px;">
          <span>A</span>
          <input type="range" id="font-size-slider" min="12" max="48" value="20" style="width: 80px;">
        </label>
        <span id="font-size-value" style="min-width: 30px;">20px</span>
      </div>

      <div class="tool-separator"></div>

      <div class="color-picker">
        <button class="color-btn active" data-color="#ef4444" style="background: #ef4444;" title="Red" type="button"></button>
        <button class="color-btn" data-color="#f59e0b" style="background: #f59e0b;" title="Orange" type="button"></button>
        <button class="color-btn" data-color="#eab308" style="background: #eab308;" title="Yellow" type="button"></button>
        <button class="color-btn" data-color="#22c55e" style="background: #22c55e;" title="Green" type="button"></button>
        <button class="color-btn" data-color="#3b82f6" style="background: #3b82f6;" title="Blue" type="button"></button>
        <button class="color-btn" data-color="#8b5cf6" style="background: #8b5cf6;" title="Purple" type="button"></button>
        <button class="color-btn" data-color="#ffffff" style="background: #ffffff;" title="White" type="button"></button>
      </div>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="copy-btn" title="Copy to clipboard" type="button">
        <span>📋</span>
        <span>Copy</span>
      </button>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="toggle-hide-btn" type="button">Hide Slide</button>
      <button class="tool-btn danger" id="delete-frame-btn" type="button">Delete Slide</button>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="editor-canvas"></canvas>
  </div>

  <div class="thumbnail-strip" id="thumbnail-strip"></div>

  <div id="text-input-overlay">
    <input type="text" id="text-input" placeholder="Enter text...">
  </div>

  <div id="confirm-overlay" class="confirm-overlay" role="presentation">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
      <div class="confirm-accent"></div>
      <h2 id="confirm-title">Confirm action</h2>
      <p id="confirm-message">Are you sure?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel-btn" class="confirm-btn cancel" type="button">Cancel</button>
        <button id="confirm-ok-btn" class="confirm-btn confirm" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="slideshow-editor.js"></script>
</body>
</html>

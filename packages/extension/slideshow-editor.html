<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Slideshow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f5f5;
      color: #1a1a1a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #333;
      font-size: 18px;
      z-index: 2000;
    }

    #toolbar-header {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      display: none;
      flex-direction: column;
      gap: 12px;
      border-bottom: 2px solid #FFC107;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .top-bar,
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-bar {
      justify-content: space-between;
    }

    .top-bar-left,
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .frame-status {
      font-size: 14px;
      font-weight: 600;
      color: #5f6368;
      padding: 8px 12px;
      border-radius: 999px;
      background: #fff8dc;
    }

    .tool-btn {
      background: transparent;
      border: none;
      color: #333;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      user-select: none;
    }

    .tool-btn:hover {
      background: #fffef5;
    }

    .tool-btn.active {
      background: #FFC107;
      color: #1a1a1a;
    }

    .tool-btn.danger {
      color: #b42318;
      background: #fff1f2;
    }

    .tool-btn.danger:hover {
      background: #ffe4e6;
    }

    .tool-btn.primary {
      background: #FFC107;
      color: #1a1a1a;
      font-weight: 700;
    }

    .tool-btn.primary:hover {
      background: #FFD54F;
    }

    .tool-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .tool-separator {
      width: 1px;
      height: 24px;
      background: #e0e0e0;
      margin: 0 4px;
    }

    .color-picker {
      display: flex;
      gap: 6px;
      margin-left: 4px;
    }

    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border 0.2s;
    }

    .color-btn.active {
      border-color: #FFC107;
      box-shadow: 0 0 0 2px rgba(255, 193, 7, 0.3);
    }

    #canvas-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
      padding: 24px;
    }

    #editor-canvas {
      max-width: 95%;
      max-height: 95%;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.35);
      cursor: crosshair;
      background: white;
    }

    #text-input-overlay {
      position: absolute;
      display: none;
      z-index: 999;
    }

    #text-input {
      font-family: Arial, sans-serif;
      font-size: 20px;
      padding: 4px 8px;
      border: 2px solid #FFC107;
      background: white;
      border-radius: 4px;
      outline: none;
      min-width: 100px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: #e0e0e0;
      border-radius: 3px;
      height: 4px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #FFC107;
      cursor: pointer;
    }

    .thumbnail-strip {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 18px 18px;
      background: rgba(255, 255, 255, 0.95);
      border-top: 1px solid #ececec;
      flex-shrink: 0;
    }

    .thumbnail-btn {
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
      background: #f5f5f5;
      cursor: pointer;
      position: relative;
      min-width: 112px;
      width: 112px;
      height: 72px;
      flex-shrink: 0;
    }

    .thumbnail-btn.active {
      border-color: #FFC107;
      box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
    }

    .thumbnail-btn.hidden-frame::after {
      content: 'Hidden';
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.82);
      color: white;
      font-size: 11px;
      font-weight: 700;
    }

    .thumbnail-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .confirm-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 17, 17, 0.45);
      backdrop-filter: blur(10px);
      z-index: 3000;
    }

    .confirm-overlay.open {
      display: flex;
    }

    .confirm-modal {
      width: min(100%, 420px);
      background: linear-gradient(180deg, #ffffff 0%, #fffdf5 100%);
      border: 1px solid rgba(255, 193, 7, 0.35);
      border-radius: 20px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
      padding: 24px;
    }

    .confirm-accent {
      width: 56px;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, #FFC107 0%, #FF8F00 100%);
      margin-bottom: 18px;
    }

    .confirm-modal h2 {
      font-size: 24px;
      color: #1a1a1a;
      margin-bottom: 10px;
    }

    .confirm-modal p {
      color: #5c5c5c;
      line-height: 1.5;
      font-size: 15px;
    }

    .confirm-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .confirm-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .confirm-btn.cancel {
      background: white;
      color: #333;
      border: 1px solid #ddd;
    }

    .confirm-btn.confirm {
      background: #FFC107;
      color: #1a1a1a;
    }
  </style>
</head>
<body>
  <div id="loading">Loading slideshow...</div>

  <div id="toolbar-header">
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="tool-btn" id="prev-frame-btn" type="button">← Previous</button>
        <button class="tool-btn" id="next-frame-btn" type="button">Next →</button>
        <span class="frame-status" id="frame-status">Frame 1 of 1</span>
      </div>
      <div class="top-bar-right">
        <button class="tool-btn primary" id="done-btn" type="button">Upload Slideshow</button>
      </div>
    </div>

    <div id="toolbar">
      <button class="tool-btn" id="undo-btn" title="Undo" disabled type="button">
        <span>↩</span>
      </button>
      <button class="tool-btn" id="redo-btn" title="Redo" disabled type="button">
        <span>↪</span>
      </button>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="crop-btn" title="Crop" type="button">
        <span>✂️</span>
      </button>
      <button class="tool-btn" id="rectangle-btn" title="Rectangle" type="button">
        <span>□</span>
      </button>
      <button class="tool-btn" id="arrow-btn" title="Arrow" type="button">
        <span>↗️</span>
      </button>
      <button class="tool-btn" id="text-btn" title="Text" type="button">
        <span>T</span>
      </button>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: #333; font-size: 13px;">
        <label for="thickness-slider" style="display: flex; align-items: center; gap: 6px;">
          <span>━</span>
          <input type="range" id="thickness-slider" min="5" max="14" value="7" style="width: 80px;">
        </label>
        <span id="thickness-value" style="min-width: 25px;">7px</span>
      </div>

      <div class="tool-separator"></div>

      <div style="display: flex; align-items: center; gap: 8px; color: #333; font-size: 13px;">
        <label for="font-size-slider" style="display: flex; align-items: center; gap: 6px;">
          <span>A</span>
          <input type="range" id="font-size-slider" min="12" max="48" value="20" style="width: 80px;">
        </label>
        <span id="font-size-value" style="min-width: 30px;">20px</span>
      </div>

      <div class="tool-separator"></div>

      <div class="color-picker">
        <button class="color-btn active" data-color="#ef4444" style="background: #ef4444;" title="Red" type="button"></button>
        <button class="color-btn" data-color="#f59e0b" style="background: #f59e0b;" title="Orange" type="button"></button>
        <button class="color-btn" data-color="#eab308" style="background: #eab308;" title="Yellow" type="button"></button>
        <button class="color-btn" data-color="#22c55e" style="background: #22c55e;" title="Green" type="button"></button>
        <button class="color-btn" data-color="#3b82f6" style="background: #3b82f6;" title="Blue" type="button"></button>
        <button class="color-btn" data-color="#8b5cf6" style="background: #8b5cf6;" title="Purple" type="button"></button>
        <button class="color-btn" data-color="#ffffff" style="background: #ffffff;" title="White" type="button"></button>
      </div>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="copy-btn" title="Copy to clipboard" type="button">
        <span>📋</span>
        <span>Copy</span>
      </button>

      <div class="tool-separator"></div>

      <button class="tool-btn" id="toggle-hide-btn" type="button">Hide Slide</button>
      <button class="tool-btn danger" id="delete-frame-btn" type="button">Delete Slide</button>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="editor-canvas"></canvas>
  </div>

  <div class="thumbnail-strip" id="thumbnail-strip"></div>

  <div id="text-input-overlay">
    <input type="text" id="text-input" placeholder="Enter text...">
  </div>

  <div id="confirm-overlay" class="confirm-overlay" role="presentation">
    <div class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
      <div class="confirm-accent"></div>
      <h2 id="confirm-title">Confirm action</h2>
      <p id="confirm-message">Are you sure?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel-btn" class="confirm-btn cancel" type="button">Cancel</button>
        <button id="confirm-ok-btn" class="confirm-btn confirm" type="button">Continue</button>
      </div>
    </div>
  </div>

  <script type="module" src="slideshow-editor.js"></script>
</body>
</html>

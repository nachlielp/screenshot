<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Import Image</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400..900;1,400..900&display=swap');

        :root {
            --paper: #faedf0;
            --paper-dark: #f2dbe1;
            --ink: #151515;
            --muted: #6f5b61;
            --line: #e4c8cf;
            --line-strong: #c9a0ab;
            --brand: #f54e00;
            --brand-dark: #b23800;
            --danger: #b91c1c;
            --font-sans: "Archivo", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 40px 24px;
            font-family: var(--font-sans);
            background: var(--paper);
            color: var(--ink);
        }

        .wrap {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .hero {
            background: #fff;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            box-shadow: 0 2px 0 rgba(0, 0, 0, .06);
            padding: 28px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 18px;
            line-height: 1.5;
        }

        .dropzone {
            margin-top: 24px;
            padding: 46px 24px;
            border: 2px dashed var(--line);
            border-radius: 8px;
            background: var(--paper-dark);
            text-align: center;
            transition: border-color 0.18s ease, background 0.18s ease;
        }

        .dropzone.drag-over {
            border-color: var(--brand);
            background: var(--paper-dark);
        }

        .dropzone strong {
            display: block;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .dropzone span {
            display: block;
            color: var(--muted);
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 22px;
        }

        button {
            padding: 14px 18px;
            border: 1.5px solid var(--line-strong);
            border-radius: 6px;
            font: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .primary {
            background: var(--brand);
            color: #fff;
            border: 1.5px solid var(--brand-dark);
            box-shadow: 0 2px 0 var(--brand-dark);
        }

        .primary:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .secondary {
            background: #fff;
            color: var(--ink);
            border: 1.5px solid var(--line-strong);
            box-shadow: 0 2px 0 rgba(0, 0, 0, .06);
        }

        .secondary:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .hidden-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="hero">
            <h1>Annotate an Image</h1>
            <p>Drop an image here, choose one from your computer, or paste from the clipboard. Nothing is uploaded yet. We only open it in the editor.</p>

            <div class="dropzone" id="dropzone">
                <strong>Drop image here</strong>
                <span>PNG, JPG, WEBP, GIF, and other browser-supported image files</span>
            </div>

            <div class="actions">
                <button class="primary" id="chooseFileBtn" type="button">Choose File</button>
                <button class="secondary" id="pasteImageBtn" type="button">Paste Clipboard Image</button>
            </div>
        </div>
    </div>

    <input class="hidden-input" id="imageInput" type="file" accept="image/*">

    <script type="module" src="import-image.js"></script>
</body>
</html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/camra-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/camra-32.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Machine-readable access for AI agents: share links look like
         <app>/#/snapshot/{shareToken}. The same data (image URL, console
         logs, network logs, metadata) is served as JSON on this same
         origin — resolve the path below against the share link's domain. -->
    <meta
      name="snapshot-agent-api"
      content="/api/snapshot/{shareToken} (relative to this page's origin)"
    />
    <title>Screenshot</title>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
